<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Relatórios | Ministérios | Esquina</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#F4F6FF;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .wrap{max-width:600px;width:100%;padding:48px 24px;text-align:center}
    .logo{font-size:1.2rem;font-weight:800;color:#1A3CFF;margin-bottom:48px;letter-spacing:-.02em}
    h1{font-size:2rem;font-weight:800;color:#111;margin-bottom:8px;letter-spacing:-.03em}
    p{font-size:.95rem;color:#555;margin-bottom:40px}
    .card{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:16px;padding:24px 28px;text-align:left;text-decoration:none;display:flex;align-items:center;gap:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);transition:all .2s}
    .card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(26,60,255,.12)}
    .card-icon{font-size:2rem;flex-shrink:0}
    .card-body{}
    .card-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#17A697;margin-bottom:4px}
    .card-title{font-size:1rem;font-weight:700;color:#111}
    .card-desc{font-size:.8rem;color:#888;margin-top:2px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Esquina · Relatórios de Ministérios</div>
    <h1>Campanhas Governamentais</h1>
    <p>Relatórios de performance de mídia programática.</p>
    <a class="card" href="ministerio-da-saude/">
      <div class="card-icon">🏥</div>
      <div class="card-body">
        <div class="card-label">Ministério da Saúde</div>
        <div class="card-title">Tempo com a Família</div>
        <div class="card-desc">Relatório Consolidado · Maio 2026</div>
      </div>
    </a>
  </div>
</body>
</html>
